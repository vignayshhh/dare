<svg width="1800" height="1760" viewBox="0 0 1800 1760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="softShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="28" stdDeviation="32" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <filter id="greenGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="phoneBg" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#07110b"/>
      <stop offset="0.52" stop-color="#050806"/>
      <stop offset="1" stop-color="#020302"/>
    </linearGradient>
    <linearGradient id="glassGreen" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#14241a"/>
      <stop offset="1" stop-color="#07100b"/>
    </linearGradient>
    <linearGradient id="blueGlass" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0e1d1c"/>
      <stop offset="1" stop-color="#07100b"/>
    </linearGradient>
    <linearGradient id="neonCard" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#07120e"/>
      <stop offset="0.5" stop-color="#061b1d"/>
      <stop offset="1" stop-color="#060507"/>
    </linearGradient>
    <radialGradient id="confessGlow" cx="50%" cy="22%" r="62%">
      <stop stop-color="#4ade8030"/>
      <stop offset="0.48" stop-color="#4ade8008"/>
      <stop offset="1" stop-color="#00000000"/>
    </radialGradient>
    <radialGradient id="arenaGlow" cx="50%" cy="78%" r="74%">
      <stop stop-color="#38bdf824"/>
      <stop offset="0.52" stop-color="#4ade800e"/>
      <stop offset="1" stop-color="#00000000"/>
    </radialGradient>
    <style>
      .title { font-family: Inter, Segoe UI, Arial, sans-serif; font-size: 44px; font-weight: 900; fill: #ffffff; letter-spacing: -1px; }
      .subtitle { font-family: Inter, Segoe UI, Arial, sans-serif; font-size: 21px; font-weight: 650; fill: #94a3b8; }
      .label { font-family: Inter, Segoe UI, Arial, sans-serif; font-size: 24px; font-weight: 900; fill: #d7ffe6; letter-spacing: 2px; }
      .small { font-family: Inter, Segoe UI, Arial, sans-serif; font-size: 19px; font-weight: 700; fill: #94a3b8; }
      .name { font-family: Inter, Segoe UI, Arial, sans-serif; font-size: 21px; font-weight: 850; fill: #ffffff; }
      .question { font-family: Inter, Segoe UI, Arial, sans-serif; font-size: 30px; font-weight: 900; fill: #ffffff; letter-spacing: -0.4px; }
      .answer { font-family: Inter, Segoe UI, Arial, sans-serif; font-size: 22px; font-weight: 720; fill: #dcefe4; }
      .chip { font-family: Inter, Segoe UI, Arial, sans-serif; font-size: 17px; font-weight: 900; fill: #061006; }
    </style>
  </defs>

  <rect width="1800" height="1760" fill="#050806"/>
  <text x="90" y="78" class="title">Truth Card UI Directions</text>
  <text x="90" y="116" class="subtitle">Pure mobile UI previews. Same content, six visual moods.</text>

  <!-- Helper shapes are repeated manually for portability. Each phone is 460x720. -->

  <!-- 1 Dark Confessional -->
  <g transform="translate(90 170)" filter="url(#softShadow)">
    <rect width="460" height="720" rx="44" fill="url(#phoneBg)" stroke="#ffffff18" stroke-width="2"/>
    <rect width="460" height="720" rx="44" fill="url(#confessGlow)"/>
    <rect x="35" y="35" width="390" height="650" rx="34" fill="#050806" stroke="#4ade8038"/>
    <circle cx="230" cy="118" r="56" fill="#4ade8018" filter="url(#greenGlow)"/>
    <text x="230" y="70" text-anchor="middle" class="label">DARK CONFESSIONAL</text>
    <circle cx="172" cy="140" r="34" fill="#22352a" stroke="#ffffff30" stroke-width="3"/>
    <circle cx="288" cy="140" r="34" fill="#1a2520" stroke="#4ade8050" stroke-width="3"/>
    <text x="230" y="200" text-anchor="middle" class="small">Aarav asked Maya</text>
    <rect x="62" y="238" width="336" height="178" rx="26" fill="#101a13" stroke="#ffffff14"/>
    <path d="M94 274H366" stroke="#4ade8060" stroke-width="3" stroke-linecap="round"/>
    <text x="230" y="319" text-anchor="middle" class="question">What did you</text>
    <text x="230" y="358" text-anchor="middle" class="question">almost admit?</text>
    <rect x="62" y="442" width="336" height="116" rx="22" fill="#0b120d" stroke="#4ade8028"/>
    <text x="86" y="482" class="small" fill="#86efac">ANSWER</text>
    <text x="86" y="520" class="answer">I still think about</text>
    <text x="86" y="550" class="answer">that night.</text>
    <rect x="62" y="595" width="160" height="54" rx="27" fill="#4ade80"/>
    <text x="142" y="630" text-anchor="middle" class="chip">TRUTH</text>
    <rect x="238" y="595" width="160" height="54" rx="27" fill="#ffffff10" stroke="#ffffff20"/>
    <text x="318" y="630" text-anchor="middle" class="small" fill="#cbd5e1">LIE</text>
  </g>

  <!-- 2 Social Poll Arena -->
  <g transform="translate(670 170)" filter="url(#softShadow)">
    <rect width="460" height="720" rx="44" fill="#030504" stroke="#ffffff18" stroke-width="2"/>
    <rect width="460" height="720" rx="44" fill="url(#arenaGlow)"/>
    <rect x="35" y="35" width="390" height="650" rx="34" fill="url(#blueGlass)" stroke="#38bdf830"/>
    <text x="230" y="70" text-anchor="middle" class="label">SOCIAL POLL ARENA</text>
    <rect x="64" y="105" width="332" height="108" rx="24" fill="#ffffff0b" stroke="#ffffff14"/>
    <text x="230" y="146" text-anchor="middle" class="question">Did this actually</text>
    <text x="230" y="184" text-anchor="middle" class="question">happen?</text>
    <rect x="64" y="245" width="332" height="142" rx="26" fill="#07120f" stroke="#4ade8028"/>
    <text x="86" y="287" class="small" fill="#86efac">MAYA ANSWERED</text>
    <text x="86" y="331" class="answer">Yes. I left early</text>
    <text x="86" y="363" class="answer">because I got nervous.</text>
    <text x="64" y="445" class="small">Crowd vote</text>
    <rect x="64" y="468" width="332" height="18" rx="9" fill="#ffffff16"/>
    <rect x="64" y="468" width="238" height="18" rx="9" fill="#4ade80"/>
    <text x="64" y="525" class="question" fill="#4ade80">72%</text>
    <text x="136" y="520" class="small">think it is truth</text>
    <rect x="64" y="590" width="150" height="58" rx="29" fill="#4ade80"/>
    <text x="139" y="627" text-anchor="middle" class="chip">TRUTH</text>
    <rect x="246" y="590" width="150" height="58" rx="29" fill="#ffffff12" stroke="#ffffff22"/>
    <text x="321" y="627" text-anchor="middle" class="small" fill="#e2e8f0">LIE</text>
  </g>

  <!-- 3 Chat Screenshot Style -->
  <g transform="translate(1250 170)" filter="url(#softShadow)">
    <rect width="460" height="720" rx="44" fill="#06100b" stroke="#ffffff18" stroke-width="2"/>
    <rect x="35" y="35" width="390" height="650" rx="34" fill="#07110c" stroke="#ffffff12"/>
    <text x="230" y="70" text-anchor="middle" class="label">CHAT SCREENSHOT</text>
    <circle cx="98" cy="125" r="24" fill="#233528"/>
    <text x="130" y="132" class="name">Aarav</text>
    <rect x="84" y="164" width="292" height="118" rx="28" fill="#15221a" stroke="#ffffff10"/>
    <text x="113" y="211" class="answer">What is one thing</text>
    <text x="113" y="244" class="answer">you hide too well?</text>
    <circle cx="360" cy="336" r="24" fill="#1c2c24" stroke="#4ade8050"/>
    <text x="84" y="343" class="name">Maya</text>
    <rect x="84" y="376" width="292" height="142" rx="28" fill="#0b1a10" stroke="#4ade802d"/>
    <text x="113" y="423" class="answer">That I care way more</text>
    <text x="113" y="456" class="answer">than I make it look.</text>
    <rect x="78" y="570" width="304" height="62" rx="31" fill="#ffffff0a" stroke="#ffffff16"/>
    <circle cx="116" cy="601" r="18" fill="#4ade80"/>
    <text x="150" y="609" class="small" fill="#d7ffe6">Truth or lie?</text>
    <text x="327" y="609" class="small" fill="#94a3b8">Vote</text>
  </g>

  <!-- 4 Case File -->
  <g transform="translate(90 960)" filter="url(#softShadow)">
    <rect width="460" height="720" rx="44" fill="#070b08" stroke="#ffffff18" stroke-width="2"/>
    <rect x="35" y="35" width="390" height="650" rx="34" fill="#0a100c" stroke="#ffffff18"/>
    <text x="230" y="70" text-anchor="middle" class="label">CASE FILE</text>
    <rect x="64" y="108" width="332" height="54" rx="12" fill="#ffffff0b" stroke="#ffffff18"/>
    <text x="88" y="143" class="small" fill="#d7ffe6">CLAIM 042</text>
    <text x="306" y="143" class="small" fill="#64748b">OPEN</text>
    <rect x="64" y="196" width="332" height="150" rx="18" fill="#111811" stroke="#ffffff18"/>
    <text x="86" y="235" class="small">QUESTION</text>
    <text x="86" y="286" class="question">Who knows the</text>
    <text x="86" y="324" class="question">real story?</text>
    <rect x="64" y="382" width="332" height="142" rx="18" fill="#0a1610" stroke="#4ade8028"/>
    <text x="86" y="421" class="small" fill="#86efac">STATEMENT</text>
    <text x="86" y="468" class="answer">Only one person,</text>
    <text x="86" y="500" class="answer">and they are here.</text>
    <rect x="64" y="574" width="150" height="54" rx="12" fill="#4ade80"/>
    <text x="139" y="609" text-anchor="middle" class="chip">REAL</text>
    <rect x="246" y="574" width="150" height="54" rx="12" fill="#ffffff0d" stroke="#ffffff20"/>
    <text x="321" y="609" text-anchor="middle" class="small" fill="#cbd5e1">FAKE</text>
  </g>

  <!-- 5 Neon Game Card -->
  <g transform="translate(670 960)" filter="url(#softShadow)">
    <rect width="460" height="720" rx="44" fill="#040607" stroke="#ffffff18" stroke-width="2"/>
    <rect x="35" y="35" width="390" height="650" rx="34" fill="url(#neonCard)" stroke="#4ade8066"/>
    <rect x="43" y="43" width="374" height="634" rx="28" stroke="#38bdf845" stroke-width="2"/>
    <text x="230" y="78" text-anchor="middle" class="label">NEON GAME CARD</text>
    <text x="230" y="134" text-anchor="middle" class="small" fill="#38bdf8">ROUND 07</text>
    <rect x="64" y="165" width="332" height="164" rx="30" fill="#081915" stroke="#4ade8040"/>
    <text x="230" y="220" text-anchor="middle" class="question">Truth or</text>
    <text x="230" y="260" text-anchor="middle" class="question">total bluff?</text>
    <rect x="80" y="365" width="300" height="96" rx="22" fill="#ffffff0d" stroke="#38bdf833"/>
    <text x="102" y="408" class="answer">I sent the message,</text>
    <text x="102" y="440" class="answer">then deleted it.</text>
    <circle cx="92" cy="524" r="8" fill="#4ade80" filter="url(#greenGlow)"/>
    <circle cx="368" cy="524" r="8" fill="#38bdf8"/>
    <rect x="64" y="575" width="150" height="56" rx="28" fill="#4ade80"/>
    <text x="139" y="611" text-anchor="middle" class="chip">TRUTH</text>
    <rect x="246" y="575" width="150" height="56" rx="28" fill="#ff5f7a22" stroke="#ff8fa344"/>
    <text x="321" y="611" text-anchor="middle" class="small" fill="#ffb4c2">LIE</text>
  </g>

  <!-- 6 Minimal Premium Feed -->
  <g transform="translate(1250 960)" filter="url(#softShadow)">
    <rect width="460" height="720" rx="44" fill="#050806" stroke="#ffffff18" stroke-width="2"/>
    <rect x="35" y="35" width="390" height="650" rx="34" fill="#0b120d" stroke="#ffffff14"/>
    <text x="230" y="70" text-anchor="middle" class="label">MINIMAL PREMIUM</text>
    <circle cx="177" cy="124" r="30" fill="#24342a"/>
    <circle cx="283" cy="124" r="30" fill="#1d2b24"/>
    <text x="230" y="178" text-anchor="middle" class="small">Aarav asked Maya</text>
    <rect x="62" y="228" width="336" height="188" rx="24" fill="#101711" stroke="#ffffff12"/>
    <text x="88" y="280" class="question">What is the truth</text>
    <text x="88" y="318" class="question">you keep editing?</text>
    <path d="M88 370H372" stroke="#ffffff18" stroke-width="2"/>
    <rect x="62" y="450" width="336" height="110" rx="22" fill="#08100b" stroke="#ffffff10"/>
    <text x="88" y="493" class="answer">I act chill when I am</text>
    <text x="88" y="525" class="answer">actually attached.</text>
    <rect x="62" y="608" width="336" height="54" rx="27" fill="#ffffff0b" stroke="#ffffff14"/>
    <rect x="68" y="614" width="158" height="42" rx="21" fill="#4ade80"/>
    <text x="147" y="642" text-anchor="middle" class="chip">Truth</text>
    <text x="312" y="642" text-anchor="middle" class="small" fill="#94a3b8">Lie</text>
  </g>
</svg>
